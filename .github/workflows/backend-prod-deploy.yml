name: Backend Production Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/allride-backend/**"

env:
  JAVA_VERSION: "21"

jobs:
  deploy-prod:
    runs-on: ubuntu-latest

    environment:
      name: Production

    defaults:
      run:
        working-directory: backend/allride-backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==========================================
      # FIX: Build the application first
      # ==========================================

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Build Application Package
        run: ./mvnw clean package -DskipTests  

      # ==========================================
      # Docker Compilation & Delivery
      # ==========================================

      - name: Login To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/allride-backend-prod:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/allride-backend-prod:${{ github.sha }} \
            .

      - name: Push Latest Tag
        run: |
          docker push \
          ${{ secrets.DOCKERHUB_USERNAME }}/allride-backend-prod:latest

      - name: Push SHA Tag
        run: |
          docker push \
          ${{ secrets.DOCKERHUB_USERNAME }}/allride-backend-prod:${{ github.sha }}

      # ==========================================
      # Remote Server Infrastructure Deployment
      # ==========================================    

      - name: Deploy To Production EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_EC2_SSH_KEY }}

          script: |
            cd /home/ubuntu/allride

            docker compose pull

            docker compose up -d

            docker image prune -f

      # ==========================================
      # Discord Notifications (Fintech Standard)
      # ==========================================    
      - name: Send Discord Deployment Notification
        if: always() # Ensures it runs on success or failure to keep the team informed
        uses: ILSZZ/discord-webhook-action@v1.2.1
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "🚀 Production Deployment Status: ${{ job.status }}"
          description: |
            ${{ job.status == 'failure' && '@everyone ⚠️ **ACTION REQUIRED: The production pipeline has broken!**' || '' }}
            **Repository:** ${{ github.repository }}
            **Branch:** `${{ github.ref_name }}`
            **Commit SHA:** `${{ github.sha }}`
            **Triggered By:** @${{ github.actor }}
            
            *The application has finished executing deployment routines on the production cluster.*
            *Execution logs can be verified within the GitHub Actions dashboard tab.*
          color: ${{ job.status == 'success' && 0x00FF00 || 0xFF0000 }} # Green for success, Red for failure      
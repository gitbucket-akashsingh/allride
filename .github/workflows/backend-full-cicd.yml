name: Backend Full CI/CD

on:
    push:
        branches:
            - main
            - dev
        paths:
            - "backend/allride-backend/**"

    pull_request:
        branches:
            - main
            - dev
        paths:
            - "backend/allride-backend/**"

jobs:
    backend-ci:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:17

                env:
                    POSTGRES_DB: allride_db
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres

                ports:
                    - 5432:5432

                options: >-
                    --health-cmd="pg_isready -U postgres"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5

        defaults:
            run:
                working-directory: backend/allride-backend

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Java 21
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
                  cache: maven

            - name: Make Maven Wrapper Executable
              run: chmod +x mvnw

            - name: Run Tests
              run: ./mvnw test

            - name: Build Application
              run: ./mvnw clean package -DskipTests

            - name: Login To Docker Hub
              if: github.event_name == 'push'
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build Docker Image
              if: github.event_name == 'push'
              run: |
                  docker build \
                    -t ${{ secrets.DOCKERHUB_USERNAME }}/allride-backend:${{ github.sha }} \
                    -t ${{ secrets.DOCKERHUB_USERNAME }}/allride-backend:latest \
                    .

            - name: Push SHA Tag
              if: github.event_name == 'push'
              run: |
                  docker push ${{ secrets.DOCKERHUB_USERNAME }}/allride-backend:${{ github.sha }}

            - name: Push Latest Tag
              if: github.event_name == 'push'
              run: |
                  docker push ${{ secrets.DOCKERHUB_USERNAME }}/allride-backend:latest

    deploy-dev:
        needs: backend-ci

        # if: github.ref == 'refs/heads/dev' && github.event_name == 'push'

        runs-on: ubuntu-latest

        steps:
            - name: Deploy To EC2
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}

                  script: |
                      cd /home/ubuntu/allride

                      docker compose pull

                      docker compose up -d

                      docker image prune -f


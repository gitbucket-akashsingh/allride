name: Backend CI

on:
    push:
        branches:
            - main
            - develop
        paths:
            - "backend/allride-backend/**"

    pull_request:
        paths:
            - "backend/allride-backend/**"

jobs:
    build:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: backend/allride-backend

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
                  cache: maven

            - run: mvn clean verify

name: Backend CI

on:
    push:
        branches:
            - main
            - dev
        paths:
            - "backend/allride-backend/**"

    pull_request:
        branches:
            - dev
        paths:
            - "backend/allride-backend/**"

    # FIX 1: Allows you to manually see and run the workflow from the UI
    workflow_dispatch:

env:
    JAVA_VERSION: "21"
    IMAGE_NAME: allride-backend

jobs:
    build-test-scan:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: backend/allride-backend

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: ${{ env.JAVA_VERSION }}
                  cache: maven

            - name: Build and Unit Test
              run: |
                  mvn clean verify

            - name: Generate Coverage Report
              run: |
                  mvn jacoco:report

            - name: Upload Coverage Report
              uses: actions/upload-artifact@v4
              with:
                  name: jacoco-report
                  path: backend/allride-backend/target/site/jacoco/

            - name: OWASP Dependency Check
              run: |
                  mvn org.owasp:dependency-check-maven:check

            - name: Upload OWASP Report
              uses: actions/upload-artifact@v4
              with:
                  name: dependency-check-report
                  path: backend/allride-backend/target/dependency-check-report.html

            - name: SonarQube Analysis
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
              run: |
                  mvn sonar:sonar -Dsonar.token=${SONAR_TOKEN}

            # FIX 2: Point the Quality Gate action to your working directory
            - name: Sonar Quality Gate
              uses: sonarsource/sonarqube-quality-gate-action@master
              timeout-minutes: 10
              with:
                  scanMetadataReportFile: backend/allride-backend/target/sonar/report-task.txt
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

            - name: Docker Login
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            # FIX 3: Explicitly define where your Dockerfile is located
            # Change "-f Dockerfile" if it lives at your root instead of the backend folder
            - name: Build Docker Image
              run: |
                  docker build \
                    -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
                    -f Dockerfile \
                    .

            - name: Trivy Scan
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
                  format: "table"
                  exit-code: "1"
                  severity: "CRITICAL,HIGH"

            - name: Start Container
              run: |
                  docker run -d \
                    --name allride-smoke \
                    -p 8080:8080 \
                    ${{ env.IMAGE_NAME }}:${{ github.sha }}

            - name: Wait For Startup
              run: sleep 30

            - name: Smoke Test Health Endpoint
              run: |
                  curl --fail http://localhost:8080/actuator/health

            - name: Cleanup Container
              if: always()
              run: |
                  docker stop allride-smoke || true
                  docker rm allride-smoke || true

            - name: Success Notification
              if: success()
              run: |
                  echo "Backend Pipeline Passed"

            - name: Failure Notification
              if: failure()
              run: |
                  echo "Backend Pipeline Failed"

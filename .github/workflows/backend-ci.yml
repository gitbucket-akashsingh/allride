name: DEVSECOPS CI Pipeline [Backend]

on:
  push:
    branches:
      - 'feature/**'
    paths:
      - "backend/allride-backend/**"
      - ".github/workflows/**"

  pull_request:
    branches:
      - dev
      - main
    paths:
      - "backend/allride-backend/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17

        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend/allride-backend

    steps:

      #################################################
      # Checkout
      #################################################

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #################################################
      # Java Setup
      #################################################

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      #################################################
      # Unit Tests
      #################################################

      - name: Run Unit Tests
        env:
          TEST_DB_URL: jdbc:postgresql://localhost:5432/allride_test
          TEST_DB_USER: ${{ secrets.POSTGRES_USER }}
          TEST_DB_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          TEST_DB_DRIVER: org.postgresql.Driver
          TEST_JPA_DIALECT: org.hibernate.dialect.PostgreSQLDialect
        run: ./mvnw test

      #################################################
      # Package Application
      #################################################

      - name: Build Application
        run: ./mvnw clean package -DskipTests

      #################################################
      # Upload Surefire Reports
      #################################################

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/allride-backend/target/surefire-reports/
          retention-days: 7

      #################################################
      # Upload Build Artifact
      #################################################

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/allride-backend/target/*.jar
          retention-days: 7

      #################################################

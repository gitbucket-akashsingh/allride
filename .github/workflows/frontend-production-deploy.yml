name: Frontend Vercel Deploy [Production]

on:
  push:
    branches:
      - main
    paths:
      - "frontend/allride-frontend/**"
      - ".github/workflows/**"

  workflow_dispatch: # Allows you to manually see and run the workflow from the UI

permissions:
  contents: read

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: 
      name: Production

    defaults:
      run:
        working-directory: frontend/allride-frontend

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/allride-frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Verify build env vars
        run: |
          echo "VITE_API_BASE_URL is set: $([ -n "$VITE_API_BASE_URL" ] && echo yes || echo NO)"
          echo "VITE_SOCKET_URL is set: $([ -n "$VITE_SOCKET_URL" ] && echo yes || echo NO)"
          echo "VITE_MAPBOX_TOKEN is set: $([ -n "$VITE_MAPBOX_TOKEN" ] && echo yes || echo NO)"
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_SOCKET_URL: ${{ vars.VITE_SOCKET_URL }}
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

      - name: Build
        run: vercel build --prod --token=$VERCEL_TOKEN
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_SOCKET_URL: ${{ vars.VITE_SOCKET_URL }}
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

      - name: Deploy Production
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
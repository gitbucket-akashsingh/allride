name: Frontend Deploy

on:
  push:
    branches:
      - dev
      - main
    paths:
      - "frontend/allride-frontend/**"

permissions:
  contents: read

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/allride-frontend

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/allride-frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          else
            npx vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
          fi

      - name: Build
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            npx vercel build --prod --token=$VERCEL_TOKEN
          else
            npx vercel build --token=$VERCEL_TOKEN
          fi

      - name: Deploy
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
          else
            npx vercel deploy --prebuilt --token=$VERCEL_TOKEN
          fi
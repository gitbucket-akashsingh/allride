name: Frontend Vercel Deploy [Preview]

on:
  push:
    branches:
      - dev
    paths:
      - "frontend/allride-frontend/**"
      - ".github/workflows/**"

permissions:
  contents: read

concurrency:
  group: preview-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    environment:
      name: Preview

    defaults:
      run:
        working-directory: frontend/allride-frontend

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/allride-frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
        
      - name: Verify Vite
        run: |
          pwd
          node --version
          npm --version
          npx vite --version
          npm list vite
          ls -la node_modules/.bin | grep vite

      - name: Build 
        run: vercel build --token=$VERCEL_TOKEN

      - name: Deploy Preview
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=$VERCEL_TOKEN --meta githubCommitRef="dev")
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV

      - name: Assign Custom Domain
        run: vercel alias set ${{ env.DEPLOY_URL }} ${{ secrets.VERCEL_DEV_DOMAIN }} --token=$VERCEL_TOKEN
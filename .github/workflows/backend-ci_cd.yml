name: Backend Full CI/CD

on:
  push:
    branches:
      - 'feature/**'
      - dev
      - main
    paths:
      - "backend/allride-backend/**"
      - ".github/workflows/**"

  pull_request:
    branches:
      - main
      - dev
    paths:
      - "backend/allride-backend/**"
      - ".github/workflows/**"

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend/allride-backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Run Tests
        run: ./mvnw test

      - name: Build Application
        run: ./mvnw clean package -DskipTests

      # Upload the compiled JAR so the deployment jobs can build the Docker image if needed
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/allride-backend/target/*.jar
          retention-days: 1

  deploy-dev:
    needs: backend-ci
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/allride-backend/target/

      - name: Login To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/allride-backend:${{ github.sha }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/allride-backend:dev-latest \
            backend/allride-backend/

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/allride-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/allride-backend:dev-latest

      - name: Deploy To EC2 (Dev)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST_DEV }} # Use unique host secret for dev
          username: ${{ secrets.EC2_USER_DEV }}
          key: ${{ secrets.EC2_SSH_KEY_DEV }}
          script: |
            cd /home/ubuntu/allride
            docker compose pull
            docker compose up -d
            docker image prune -f

  deploy-prod:
    needs: backend-ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: Production_ENV

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/allride-backend/target/

      - name: Login To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/allride-backend:${{ github.sha }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/allride-backend:latest \
            backend/allride-backend/

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/allride-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/allride-backend:latest

      - name: Deploy To EC2 (Prod)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST_PROD }} # Use unique host secret for prod
          username: ${{ secrets.EC2_USER_PROD }}
          key: ${{ secrets.EC2_SSH_KEY_PROD }}
          script: |
            cd /home/ubuntu/allride
            docker compose pull
            docker compose up -d
            docker image prune -f

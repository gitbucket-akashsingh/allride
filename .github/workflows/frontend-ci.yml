name: Frontend CI

on:
  push:
    branches:
      - feature/workbench
    paths:
      - "frontend/allride-frontend/**"
      - ".github/workflows/frontend-ci.yml"

  pull_request:
    branches:
      - dev
      - main
    paths:
      - "frontend/allride-frontend/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Frontend Validation
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/allride-frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/allride-frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      #################################################################
      # ACTIVE CHECKS
      #################################################################

      - name: ESLint
        run: npm run lint

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Build Validation
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_SOCKET_URL: ${{ vars.VITE_SOCKET_URL }}
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

      #################################################################
      # FUTURE CHECKS (UNCOMMENT WHEN NEEDED)
      #################################################################

      # ---------------------------------------------------------------
      # TypeScript
      # Requires:
      # npm install -D typescript
      # package.json:
      # "type-check": "tsc --noEmit"
      # ---------------------------------------------------------------
      #
      # - name: Type Check
      #   run: npm run type-check

      # ---------------------------------------------------------------
      # Unit Tests
      # Requires:
      # npm install -D vitest jsdom
      # package.json:
      # "test": "vitest run"
      # ---------------------------------------------------------------

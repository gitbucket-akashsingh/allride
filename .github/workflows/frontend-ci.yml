name: Frontend CI

on:
  pull_request:
    branches:
      - dev
      - main
    paths:
      - "frontend/allride-frontend/**"

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/allride-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/allride-frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Build Validation
        run: npm run build
        env:
          VITE_API_BASE_URL: 
          VITE_SOCKET_URL: 
          VITE_MAPBOX_TOKEN:
spring.application.name=allride
#server.port=8081

spring.config.import=optional:file:.env[.properties]
#spring.config.import=optional:file:./backend/allride-backend/.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.security.user.name=${MY_ENV_USERNAME}
spring.security.user.password=${MY_ENV_PASSWORD}

spring.jpa.open-in-view=true

#logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security=TRACE

jwt.secret=${JWT_SECRET_KEY}
jwt.expiration=900000

#To disable it in production, set the property false
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false


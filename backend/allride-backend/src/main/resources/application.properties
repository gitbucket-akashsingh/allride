spring.application.name=allride
#server.port=8081

spring.config.import=optional:file:.env[.properties]
#spring.config.import=optional:file:./backend/allride-backend/.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway — owns schema; Hibernate only validates entities match DB
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.security.user.name=${MY_ENV_USERNAME}
spring.security.user.password=${MY_ENV_PASSWORD}
spring.jpa.open-in-view=true

#logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security=TRACE

jwt.secret=${JWT_SECRET_KEY}
jwt.expiration=900000

#To disable it in production, set the property false
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Resend (SMTP relay — production-safe, uses TLS)
spring.mail.host=smtp.resend.com
spring.mail.port=587
spring.mail.username=resend
spring.mail.password=${RESEND_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# OTP security settings
app.otp.expiry-minutes=${OTP_EXPIRY_MINUTES:10}
app.otp.max-attempts=${OTP_MAX_ATTEMPTS:5}
app.otp.resend-cooldown-seconds=${OTP_RESEND_COOLDOWN_SECONDS:60}
app.otp.max-resends-per-hour=${OTP_MAX_RESENDS_PER_HOUR:5}
app.email.from=${RESEND_FROM_EMAIL}
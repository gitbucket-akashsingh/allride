# Tests: no Flyway, Hibernate builds schema in memory
spring.flyway.enabled=false

# Default: H2 local. CI overrides with TEST_DB_URL env var.
spring.datasource.url=${TEST_DB_URL:jdbc:h2:mem:allride_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${TEST_DB_USER:sa}
spring.datasource.password=${TEST_DB_PASSWORD:}
spring.datasource.driver-class-name=${TEST_DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=${TEST_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

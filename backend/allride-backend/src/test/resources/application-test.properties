# Auth / mail stubs (avoid needing .env in CI)
jwt.secret=testsecretkeytestsecretkeytestsecretkey
jwt.expiration=900000

spring.security.user.name=test
spring.security.user.password=test

spring.mail.password=test
app.email.from=test@example.com
app.otp.expiry-minutes=10
app.otp.max-attempts=5
app.otp.resend-cooldown-seconds=60
app.otp.max-resends-per-hour=5


